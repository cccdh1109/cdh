spring.application.name=oss-es-importer
server.port=8080

# datasource (MyBatis)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/import_task?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# elasticsearch 7.10
es.host=127.0.0.1
es.port=9200
es.scheme=http

# aliyun oss
oss.endpoint=oss-cn-hangzhou.aliyuncs.com
oss.access-key-id=your-ak
oss.access-key-secret=your-sk

# dynamic cron reload interval
# poll DB every 60s to apply latest cron settings without restart
dynamic.schedule.reload-interval-ms=60000

logging.level.com.example.importer=INFO
